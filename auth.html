<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auth - KnowledgeHub</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet"></noscript>
  <script type="module" src="firebase-auth.js" defer></script>
  <style>
    /* Auth Container */
.auth-form {
  width: 350px;
  margin: 80px auto;
  padding: 30px;
  background: #fff;
  border-radius: 20px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.08);
  text-align: center;
  transition: 0.3s;
}

/* Cozy heading */
.auth-form h2 {
  margin-bottom: 20px;
  color: #cc0000;
  font-weight: 600;
}

/* Input Fields */
.auth-form input {
  width: 100%;
  padding: 12px 15px;
  margin: 10px 0;
  border-radius: 12px;
  border: 1px solid #eee;
  background: #fafafa;
  transition: 0.3s;
  font-size: 14px;
}

.auth-form input:focus {
  border-color: #ff4d4d;
  background: #fff;
  outline: none;
  box-shadow: 0 0 0 3px rgba(255, 77, 77, 0.1);
}

/* Button */
.auth-form .btn {
  width: 100%;
  margin-top: 15px;
  background: linear-gradient(135deg, #ff4d4d, #cc0000);
  color: white;
  border-radius: 30px;
  padding: 12px;
  font-weight: 600;
  transition: 0.3s;
}

.auth-form .btn:hover {
  background: linear-gradient(135deg, #ff6666, #b30000);
}

/* Text & Links */
.auth-form p {
  margin-top: 15px;
  font-size: 14px;
  color: #555;
}

.auth-form a {
  color: #cc0000;
  font-weight: 500;
  text-decoration: none;
}

.auth-form a:hover {
  text-decoration: underline;
}

/* Cozy Background */
body {
  background: linear-gradient(120deg, #ffe5e5, #fff5f5);
}

/* Soft animation */
.auth-form:hover {
  transform: translateY(-5px);
}
  </style>
</head>
<body>
  <header>
    <div class="logo">◉ KnowledgeHub</div>
    <nav>
      <a href="index.html">Home</a>
      <a href="forum.html">Forum</a>
    </nav>
  </header>

  <section class="hero">
    <h1>Login to KnowledgeHub</h1>
    <p>Connect with the community</p>

    <div class="auth-container">
      <!-- Login Form -->
      <div id="login-form" class="auth-form">
        <h2>Login</h2>
        <input type="email" id="login-email" placeholder="Email">
        <input type="password" id="login-password" placeholder="Password">
        <button id="login-btn" class="btn">Login</button>
        <p>Don't have account? <a href="#" id="switch-signup">Sign up</a></p>
      </div>

      <!-- Signup Form -->
      <div id="signup-form" class="auth-form" style="display:none;">
        <h2>Create Account</h2>
        <input type="text" id="signup-name" placeholder="Full Name">
        <input type="email" id="signup-email" placeholder="Email">
        <input type="password" id="signup-password" placeholder="Password">
        <input type="password" id="signup-confirm-password" placeholder="Confirm Password">
        <button id="signup-btn" class="btn" type="submit">Sign Up</button>
        <p>Have account? <a href="#" id="switch-login">Login</a></p>
      </div>
    </div>
  </section>

  <footer>
    <p>© 2026 KnowledgeHub</p>
  </footer>
</body>
</html>
