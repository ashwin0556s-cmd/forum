<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Forum - KnowledgeHub</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <header>
      <div class="logo">◉ KnowledgeHub</div>
      <nav>
        <a href="index.html">Home</a>
        <a href="forum.html">Forum</a>
        <a href="#">Profile</a>
      </nav>
    </header>

    <section class="forum-container">
      <div class="post-box">
        <h2>✎ Share Something</h2>
        <textarea placeholder="Write your thoughts..."></textarea>
        <button class="btn">⟡ Post</button>
      </div>

      <div class="post">
        <h3>⚡ How does GraphQL improve APIs?</h3>
        <p>GraphQL allows clients to request only the data they need...</p>

        <div class="actions">
          <span>♡ Like</span>
          <span>💬 Comment</span>
          <span>⤴ Share</span>
        </div>

        <div class="comment-box">
          <input type="text" placeholder="Write a comment..." />
          <button>➤</button>
        </div>
      </div>
    </section>

    <footer>
      <p>© 2026 KnowledgeHub | Connect • Learn • Share</p>
    </footer>
  </body>
</html>
